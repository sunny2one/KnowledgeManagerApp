name: Build Knowledge Manager APKs

on:
  workflow_dispatch:
  push:
    paths:
      - "KnowledgeManagerBundle.zip"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Unzip bundle
        run: |
          rm -rf bundle
          mkdir bundle
          unzip -q KnowledgeManagerBundle.zip -d bundle

      - name: Build SearchBot
        working-directory: bundle/SearchBot
        run: gradle assembleDebug

      - name: Build AnswerAssistant
        working-directory: bundle/AnswerAssistant
        run: gradle assembleDebug

      - name: Upload SearchBot APK
        uses: actions/upload-artifact@v4
        with:
          name: KnowledgeSearchBot-APK
          path: bundle/SearchBot/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AnswerAssistant APK
        uses: actions/upload-artifact@v4
        with:
          name: KnowledgeAnswerAssistant-APK
          path: bundle/AnswerAssistant/app/build/outputs/apk/debug/app-debug.apk
