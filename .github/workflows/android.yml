name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.kt"
      - "**/*.kts"
      - "**/*.xml"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show project information
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          set -e
          mkdir -p apk-output

          APK_PATH="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "APK 파일을 찾지 못했습니다."
            find app/build/outputs -maxdepth 5 -type f || true
            exit 1
          fi

          cp "$APK_PATH" "apk-output/BlogActivityManager_v1.0-debug.apk"
          ls -lh apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlogActivityManager-v1.0-debug
          path: apk-output/BlogActivityManager_v1.0-debug.apk
          if-no-files-found: error
          retention-days: 30
