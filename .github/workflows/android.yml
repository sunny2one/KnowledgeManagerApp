name: Build Blog Activity Manager APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.13

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Show project structure
        run: |
          pwd
          find . -maxdepth 3 -type f | sort
          ./gradlew projects

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/debug/app-debug.apk artifact/BlogActivityManager_v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlogActivityManager_v1.0
          path: artifact/BlogActivityManager_v1.0.apk
          if-no-files-found: error
          retention-days: 30
