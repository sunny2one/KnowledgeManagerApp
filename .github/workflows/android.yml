name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk BlogActivityManager_v1.1.apk
      - uses: actions/upload-artifact@v4
        with:
          name: BlogActivityManager-v1.1
          path: BlogActivityManager_v1.1.apk
          if-no-files-found: error
          retention-days: 30


